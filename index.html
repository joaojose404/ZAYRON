function initMap() {

async function iniciarNavegacao(sentido) {
    const nome = document.getElementById('nome_v').value.trim();
    const placa = document.getElementById('placa_v').value.trim();
    let destCoord, labelDestino;

    if(!nome || !placa) return alert("Preencha Nome e Placa.");

    // --- SUA BUSCA DE DESTINO (IGUAL) ---
    if (sentido === 'ida') {
        const lote = document.getElementById('lote_alvo').value.trim().toUpperCase();
        const rua = document.getElementById('rua_alvo').value;
        const num = document.getElementById('num_alvo').value.trim();

        if (lote && BANCO_COORDENADAS.LOTES?.[lote]) {
            destCoord = { lat: BANCO_COORDENADAS.LOTES[lote][0], lng: BANCO_COORDENADAS.LOTES[lote][1] };
            labelDestino = "LOTE " + lote;
        } else if (rua && num && BANCO_COORDENADAS.RUAS?.[rua]?.[num]) {
            destCoord = { lat: BANCO_COORDENADAS.RUAS[rua][num][0], lng: BANCO_COORDENADAS.RUAS[rua][num][1] };
            labelDestino = rua + ", " + num;
        } else {
            return alert("Destino não encontrado.");
        }
        localStorage.setItem('dados_visitante', JSON.stringify({ nome, placa, destino: labelDestino }));
    } else {
        destCoord = BANCO_COORDENADAS.PORTARIA;
        labelDestino = "SAÍDA/PORTARIA";
    }

    // --- AQUI ESTÁ O SEGREDO: ENVIO IMEDIATO ---
    // Criamos o registro ANTES de pedir o GPS para não ter atraso
    const novoRegistro = {
        nome: nome.toUpperCase(),
        placa: placa.toUpperCase(),
        lote_destino: labelDestino,
        status_viagem: 'INICIOU ROTA'
    };

    // Comando direto sem travar a tela
    const { data, error } = await supabaseClient.from('rastreamento').insert([novoRegistro]).select();
    
    if (data && data.length > 0) {
        idViagemSupabase = data[0].id;
        console.log("Conectado ao CCO:", idViagemSupabase);
    }

    // --- SUA ROTA (NÃO MUDOU NADA) ---
    solicitarWakeLock();

    navigator.geolocation.getCurrentPosition((pos) => {
        const origin = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        map.setCenter(origin);
        map.setZoom(19);

        directionsService.route({
            origin: origin,
            destination: destCoord,
            travelMode: google.maps.TravelMode.DRIVING
        }, (result, status) => {
            if (status === "OK") {
                directionsRenderer.setDirections(result);
                rotaPath = result.routes[0].overview_path;
            } else {
                new google.maps.Polyline({
                    path: [origin, destCoord],
                    map: map,
                    strokeColor: "#1d4ed8",
                    strokeWeight: 8
                });
                rotaPath = [origin, destCoord];
            }
            ativarMonitoramento(nome, placa, labelDestino, sentido, destCoord);
        });
    }, (err) => alert("Erro GPS"), { enableHighAccuracy: true });
}

function ativarMonitoramento(nome, placa, labelDestino, sentido, destCoord) {
    if (watchID) navigator.geolocation.clearWatch(watchID);

    watchID = navigator.geolocation.watchPosition(async (p) => {
        const lat = p.coords.latitude;
        const lng = p.coords.longitude;
        const vel = p.coords.speed ? Math.round(p.coords.speed * 3.6) : 0;
        const gPos = new google.maps.LatLng(lat, lng);
        const agora = Date.now();

        marker.setPosition(gPos);
        map.panTo(gPos);

        let statusAlerta = sentido === 'ida' ? "EM ROTA" : "EM ROTA DE SAÍDA";
        
        // Atualização do Banco (A cada 15 segundos)
        if (agora - ultimaGravacaoBanco >= INTERVALO_BANCO && idViagemSupabase) {
            ultimaGravacaoBanco = agora;
            
            // Enviando para as colunas exatas do seu SQL
            supabaseClient.from('rastreamento').update({
                latitude: lat,
                longitude: lng,
                velocidade: vel,
                status_viagem: statusAlerta
            }).eq('id', idViagemSupabase).then(({error}) => {
                if(error) console.log("Erro no update:", error);
            });
        }

        // Chegada
        const distFinal = google.maps.geometry.spherical.computeDistanceBetween(gPos, new google.maps.LatLng(destCoord.lat, destCoord.lng));
        if (distFinal < 20) {
            navigator.geolocation.clearWatch(watchID);
            location.reload();
        }
    }, (err) => console.error(err), { enableHighAccuracy: true, maximumAge: 0 });
}
async function solicitarWakeLock() {
    try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e){}
