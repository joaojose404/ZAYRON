<style>

body{
margin:0;
background:#001529;
color:white;
font-family:sans-serif;
display:flex;
flex-direction:column;
height:100vh;
overflow:hidden;
}

#map-visitante{
flex:1;
width:100%;
}

.controles{
background:#1e293b;
padding:15px;
border-top:4px solid #3b82f6;
z-index:1000;
}

input, select{
width:100%;
padding:12px;
margin-bottom:8px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
font-size:16px;
box-sizing:border-box;
}

.linha-dupla{
display:grid;
grid-template-columns:2fr 1fr;
gap:8px;
}

.btn-group{
display:flex;
gap:10px;
}

button{
flex:1;
padding:18px;
border:none;
border-radius:10px;
font-weight:bold;
color:white;
font-size:14px;
text-transform:uppercase;
cursor:pointer;
transition:0.2s;
}

.btn-ida{
background:#059669;
}

.btn-volta{
background:#7c3aed;
}

#status-txt{
text-align:center;
margin-top:12px;
padding:10px;
border-radius:8px;
font-size:16px;
font-weight:bold;
transition:0.3s;
background:#0f172a;
}

.cor-verde{
background:#059669 !important;
}

.cor-vermelha{
background:#d32f2f !important;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0.6}
100%{opacity:1}
}

</style>

</head>

// =========================
// HELPERS
// =========================
function atualizarStatus(texto, classe = "") {
    const el = document.getElementById("status-txt");
    if (!el) return;
    el.textContent = texto;
    el.classList.remove("cor-verde", "cor-vermelha");
    if (classe) el.classList.add(classe);
}

function atualizarDestino(texto) {
    const el = document.getElementById("status-destino");
    if (el) el.textContent = "Destino: " + texto;
}

function normalizarTexto(txt) {
    return (txt || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ")
        .trim()
        .toUpperCase();
}

function encontrarRuaNoBanco(ruaSelecionada) {
    const ruas = BANCO_COORDENADAS.RUAS || {};
    const alvo = normalizarTexto(ruaSelecionada);

    if (ruas[ruaSelecionada]) return ruas[ruaSelecionada];

    for (const chave of Object.keys(ruas)) {
        if (normalizarTexto(chave) === alvo) return ruas[chave];
    }

    const alvoSemRua = alvo.replace(/^RUA\s+/, "");
    for (const chave of Object.keys(ruas)) {
        const chaveNorm = normalizarTexto(chave).replace(/^RUA\s+/, "");
        if (chaveNorm === alvoSemRua) return ruas[chave];
    }

    return null;
}

function obterDestinoPorRuaNumero(rua, numero) {
    const ruaBanco = encontrarRuaNoBanco(rua);
    if (!ruaBanco) return null;

    const numeroTxt = String(numero).trim();

    if (ruaBanco[numeroTxt]) {
        return { lat: ruaBanco[numeroTxt][0], lng: ruaBanco[numeroTxt][1] };
    }

    const numero2 = numeroTxt.padStart(2, "0");
    if (ruaBanco[numero2]) {
        return { lat: ruaBanco[numero2][0], lng: ruaBanco[numero2][1] };
    }

    return null;
}

function obterDestinoPorLote(lote) {
    const lotes = BANCO_COORDENADAS.LOTES || {};
    const alvo = normalizarTexto(lote);

    if (lotes[alvo]) {
        return { lat: lotes[alvo][0], lng: lotes[alvo][1] };
    }

    for (const chave of Object.keys(lotes)) {
        if (normalizarTexto(chave) === alvo) {
            return { lat: lotes[chave][0], lng: lotes[chave][1] };
        }
    }

    return null;
}

function calcularHeading(origem, destino) {
    return google.maps.geometry.spherical.computeHeading(origem, destino);
}

function normalizarHeading(h) {
    let v = h;
    while (v < 0) v += 360;
    while (v >= 360) v -= 360;
    return v;
}

function diffHeading(a, b) {
    let d = b - a;
    while (d > 180) d -= 360;
    while (d < -180) d += 360;
    return d;
}

function suavizarHeadingSeguro(anterior, atual) {
    if (anterior == null || isNaN(anterior)) return atual;

    let diff = atual - anterior;
    if (diff > 180) diff -= 360;
    if (diff < -180) diff += 360;

    if (Math.abs(diff) > 120) {
        return anterior;
    }

    return anterior + diff * 0.22;
}

function ajustarMapaParaTela() {
    if (!map) return;
    google.maps.event.trigger(map, "resize");
}

function lerp(a, b, t) {
    return a + (b - a) * t;
}

function lerpLatLng(a, b, t) {
    return new google.maps.LatLng(
        lerp(a.lat(), b.lat(), t),
        lerp(a.lng(), b.lng(), t)
    );
}

function suavizarHeadingAnimado(atual, alvo, fator = 0.14) {
    return atual + diffHeading(atual, alvo) * fator;
}

function atualizarSetaFixaTopo() {
    const icon = marker.getIcon();
    icon.rotation = 0;
    marker.setIcon(icon);
}

function centralizarComOffsetDirecional(pos, heading) {
    if (!map) return;

    const proj = map.getProjection();
    if (!proj) {
        map.setCenter(pos);
        return;
    }

    const scale = Math.pow(2, map.getZoom());
    const worldPoint = proj.fromLatLngToPoint(pos);
    const altura = window.innerHeight || 800;

    // carro fica mais abaixo na tela
    const offsetPx = altura * 0.18;

    // desloca para trás da direção do movimento
    const rad = (normalizarHeading(heading) * Math.PI) / 180;
    const dx = Math.sin(rad) * (offsetPx / scale);
    const dy = -Math.cos(rad) * (offsetPx / scale);

    const newPoint = new google.maps.Point(
        worldPoint.x - dx,
        worldPoint.y - dy
    );

    const newCenter = proj.fromPointToLatLng(newPoint);
    map.setCenter(newCenter);
}

function encontrarSegmentoMaisProximo(pos) {
    if (!rotaPath || rotaPath.length < 2) return null;

    let menorDist = Infinity;
    let melhorIndice = 0;

    for (let i = 0; i < rotaPath.length - 1; i++) {
        const a = rotaPath[i];
        const b = rotaPath[i + 1];

        const distA = google.maps.geometry.spherical.computeDistanceBetween(pos, a);
        const distB = google.maps.geometry.spherical.computeDistanceBetween(pos, b);
        const dist = Math.min(distA, distB);

        if (dist < menorDist) {
            menorDist = dist;
            melhorIndice = i;
        }
    }

    return {
        i: melhorIndice,
        a: rotaPath[melhorIndice],
        b: rotaPath[melhorIndice + 1]
    };
}

function obterHeadingDaRota(pos, headingGps, vel) {
    if (!rotaPath || rotaPath.length < 2) {
        return headingGps ?? ultimoHeadingValido ?? 0;
    }

    const seg = encontrarSegmentoMaisProximo(pos);
    if (!seg) return headingGps ?? ultimoHeadingValido ?? 0;

    let headingRota = calcularHeading(seg.a, seg.b);
    headingRota = normalizarHeading(headingRota);

    // se o GPS for confiável e movimento estiver rápido, usa mistura GPS+rota
    if (headingGps != null && !isNaN(headingGps) && vel >= 12) {
        const gpsNorm = normalizarHeading(headingGps);
        const diff = Math.abs(diffHeading(headingRota, gpsNorm));

        if (diff <= 45) {
            return normalizarHeading(headingRota + diffHeading(headingRota, gpsNorm) * 0.35);
        }
    }

    return headingRota;
}

function iniciarAnimacaoCamera() {
    if (cameraAnimando || !destinoCamera) return;
    cameraAnimando = true;

    const animar = () => {
        if (!destinoCamera || !map) {
            cameraAnimando = false;
            return;
        }

        if (!posicaoAnimada) {
            posicaoAnimada = destinoCamera.pos;
        }

        posicaoAnimada = lerpLatLng(posicaoAnimada, destinoCamera.pos, 0.16);
        headingAnimado = suavizarHeadingAnimado(
            headingAnimado || destinoCamera.heading,
            destinoCamera.heading,
            0.16
        );

        marker.setPosition(posicaoAnimada);
        atualizarSetaFixaTopo();

        map.setHeading(normalizarHeading(headingAnimado));
        centralizarComOffsetDirecional(posicaoAnimada, headingAnimado);

        const dist = google.maps.geometry.spherical.computeDistanceBetween(
            posicaoAnimada,
            destinoCamera.pos
        );

        const headingRestante = Math.abs(diffHeading(headingAnimado, destinoCamera.heading));

        if (dist > 0.7 || headingRestante > 1) {
            requestAnimationFrame(animar);
        } else {
            posicaoAnimada = destinoCamera.pos;
            headingAnimado = destinoCamera.heading;
            marker.setPosition(posicaoAnimada);
            atualizarSetaFixaTopo();
            map.setHeading(normalizarHeading(headingAnimado));
            centralizarComOffsetDirecional(posicaoAnimada, headingAnimado);
            cameraAnimando = false;
        }
    };

    requestAnimationFrame(animar);
}

function moverCameraSuave(pos, heading, velocidadeKmh) {
    let zoomDesejado = 19;
    let tiltDesejado = 50;

    if (velocidadeKmh >= 75) {
        zoomDesejado = 20;
        tiltDesejado = 67.5;
    } else if (velocidadeKmh >= 45) {
        zoomDesejado = 19;
        tiltDesejado = 60;
    } else if (velocidadeKmh >= 15) {
        zoomDesejado = 19;
        tiltDesejado = 50;
    } else {
        zoomDesejado = 19;
        tiltDesejado = 40;
    }

    if (Math.abs(map.getZoom() - zoomDesejado) >= 1) {
        map.setZoom(zoomDesejado);
    }

    if (Math.abs((map.getTilt() || 0) - tiltDesejado) >= 8) {
        map.setTilt(tiltDesejado);
    }

    destinoCamera = {
        pos,
        heading: normalizarHeading(heading || 0)
    };

    iniciarAnimacaoCamera();
}

async function solicitarWakeLock() {
    if ("wakeLock" in navigator) {
        try {
            wakeLock = await navigator.wakeLock.request("screen");
        } catch (err) {
            console.log("WakeLock não suportado", err);
        }
    }
}

function limparSessaoGPS() {
    if (watchID) {
        navigator.geolocation.clearWatch(watchID);
        watchID = null;
    }

    rotaPath = [];
    ultimaPosicaoValida = null;
    ultimoHeadingValido = 0;
    inicioParado = null;
    ultimoStatusEnviado = "";
    posicaoAnimada = null;
    headingAnimado = 0;
    cameraAnimando = false;
    destinoCamera = null;

    velocidadeMaximaViagem = 0;
    houveExcessoVelocidade = false;
    houveForaRota = false;
    houveParadaProlongada = false;
}

function mostrarErroGPS(erro) {
    let msg = "Não foi possível obter sua localização.";

    if (erro && erro.code === 1) {
        msg = "Permissão de localização negada pelo navegador. No iPhone, abra em uma aba normal do Safari e permita a localização para este site.";
    } else if (erro && erro.code === 2) {
        msg = "Localização indisponível. Verifique GPS, internet e tente em local aberto.";
    } else if (erro && erro.code === 3) {
        msg = "O GPS demorou para responder. Tente novamente em local aberto.";
    } else if (erro && erro.message) {
        msg = erro.message;
    }

    console.error("Erro GPS:", erro);
    alert(msg);
    atualizarStatus("ERRO GPS", "cor-vermelha");
}

function obterOrigemAtual(callbackSucesso, callbackErro) {
    if (ultimaPosicaoValida) {
        callbackSucesso({
            lat: ultimaPosicaoValida.lat(),
            lng: ultimaPosicaoValida.lng()
        });
        return;
    }

    if (!navigator.geolocation) {
        callbackErro({ message: "Geolocalização não suportada neste dispositivo." });
        return;
    }

    navigator.geolocation.getCurrentPosition((pos) => {
        callbackSucesso({
            lat: pos.coords.latitude,
            lng: pos.coords.longitude
        });
    }, () => {
        navigator.geolocation.getCurrentPosition((pos) => {
            callbackSucesso({
                lat: pos.coords.latitude,
                lng: pos.coords.longitude
            });
        }, (erroFinal) => {
            callbackErro(erroFinal);
        }, {
            enableHighAccuracy: true,
            maximumAge: 5000,
            timeout: 20000
        });
    }, {
        enableHighAccuracy: false,
        maximumAge: 10000,
        timeout: 12000
    });
}

// =========================
// BANCO
// =========================
async function criarRegistroViagem(nome, placa, labelDestino, sentido) {
    const prefixo = sentido === "ida" ? "ENTRADA" : "SAIDA";

    const { data, error } = await supabaseClient
        .from("rastreamento")
        .insert([{
            nome: nome.toUpperCase(),
            placa: placa.toUpperCase(),
            lote_destino: labelDestino,
            status_viagem: `${prefixo} - INICIANDO ROTA`,
            tipo_viagem: prefixo,
            velocidade_maxima: 0,
            teve_excesso_velocidade: false,
            teve_fora_rota: false,
            teve_parada_prolongada: false
        }])
        .select()
        .single();

    if (error) throw error;
    return data.id;
}

async function atualizarRegistroViagem(lat, lng, vel, statusTexto, forcar = false) {
    if (!idViagemSupabase) return;

    const agora = Date.now();
    const mudouStatus = statusTexto !== ultimoStatusEnviado;

    if (!forcar && !mudouStatus && (agora - ultimaGravacaoBanco < INTERVALO_BANCO)) {
        return;
    }

    ultimaGravacaoBanco = agora;
    ultimoStatusEnviado = statusTexto;

    const payload = {
        latitude: lat,
        longitude: lng,
        velocidade: vel,
        status_viagem: statusTexto,
        tipo_viagem: modoNavegacao === "ida" ? "ENTRADA" : "SAIDA",
        velocidade_maxima: velocidadeMaximaViagem,
        teve_excesso_velocidade: houveExcessoVelocidade,
        teve_fora_rota: houveForaRota,
        teve_parada_prolongada: houveParadaProlongada
    };

    const { error } = await supabaseClient
        .from("rastreamento")
        .update(payload)
        .eq("id", idViagemSupabase);

    if (error) {
        console.error("Erro update:", error);
    }
}

// =========================
// INICIAR NAVEGAÇÃO
// =========================
async function iniciarNavegacao(sentido) {
    const nome = document.getElementById("nome_v").value.trim();
    const placa = document.getElementById("placa_v").value.trim();

    if (!nome || !placa) {
        alert("Preencha nome e placa.");
        return;
    }

    let destCoord;
    let labelDestino;

    if (sentido === "ida") {
        const lote = document.getElementById("lote_alvo").value.trim().toUpperCase();
        const rua = document.getElementById("rua_alvo").value;
        const numero = document.getElementById("num_alvo").value.trim();

        if (rua && numero) {
            destCoord = obterDestinoPorRuaNumero(rua, numero);
            if (!destCoord) {
                alert("Endereço não encontrado para esta rua e número.");
                return;
            }

            labelDestino = `${rua} ${numero}`;

            localStorage.setItem("dados_visitante", JSON.stringify({
                nome,
                placa,
                rua_origem: rua,
                numero_origem: numero
            }));
        } else if (lote) {
            destCoord = obterDestinoPorLote(lote);
            if (!destCoord) {
                alert("Lote não encontrado.");
                return;
            }

            labelDestino = lote;

            localStorage.setItem("dados_visitante", JSON.stringify({
                nome,
                placa,
                lote_origem: lote
            }));
        } else {
            alert("Digite Rua + Número ou Quadra/Lote.");
            return;
        }
    } else {
        destCoord = BANCO_COORDENADAS.PORTARIA;
        labelDestino = "PORTARIA";
    }

    try {
        limparSessaoGPS();

        nomeAtual = nome;
        placaAtual = placa;
        modoNavegacao = sentido;
        destinoAtual = destCoord;

        atualizarDestino(labelDestino);
        atualizarStatus(sentido === "ida" ? "ENTRADA - LOCALIZANDO GPS..." : "SAIDA - LOCALIZANDO GPS...", "cor-verde");

        await solicitarWakeLock();

        obterOrigemAtual(async (origin) => {
            try {
                idViagemSupabase = await criarRegistroViagem(nome, placa, labelDestino, sentido);

                directionsService.route({
                    origin: origin,
                    destination: destCoord,
                    travelMode: google.maps.TravelMode.DRIVING
                }, (result, status) => {
                    if (status === "OK") {
                        directionsRenderer.setDirections(result);
                        rotaPath = result.routes[0].overview_path || [];

                        const origemLatLng = new google.maps.LatLng(origin.lat, origin.lng);
                        marker.setPosition(origemLatLng);
                        ultimaPosicaoValida = origemLatLng;
                        posicaoAnimada = origemLatLng;
                        headingAnimado = 0;
                        centralizarComOffsetDirecional(origemLatLng, 0);

                        ativarMonitoramento(sentido, labelDestino, destCoord);
                    } else {
                        alert("Não foi possível calcular a rota.");
                        atualizarStatus("ERRO NA ROTA", "cor-vermelha");
                    }
                });
            } catch (err) {
                console.error("Erro ao criar viagem:", err);
                alert("Erro ao iniciar rastreamento: " + err.message);
                atualizarStatus("ERRO AO INICIAR", "cor-vermelha");
            }
        }, (erro) => {
            mostrarErroGPS(erro);
        });

    } catch (err) {
        console.error("Erro ao iniciar viagem:", err);
        alert("Erro ao iniciar rastreamento: " + err.message);
        atualizarStatus("ERRO AO INICIAR", "cor-vermelha");
    }
}

// =========================
// MONITORAMENTO
// =========================
function ativarMonitoramento(sentido, labelDestino, destCoord) {
    if (watchID) navigator.geolocation.clearWatch(watchID);

    watchID = navigator.geolocation.watchPosition(async (p) => {
        const lat = p.coords.latitude;
        const lng = p.coords.longitude;
        const acc = p.coords.accuracy || 999;
        const velMs = p.coords.speed || 0;
        const vel = Math.max(0, Math.round(velMs * 3.6));
        const pos = new google.maps.LatLng(lat, lng);
        const agora = Date.now();

        if (vel >= 60 && acc > 80) return;
        if (vel < 60 && acc > 40) return;

        if (vel > velocidadeMaximaViagem) {
            velocidadeMaximaViagem = vel;
        }

        let headingGps = p.coords.heading;

        if ((headingGps == null || isNaN(headingGps) || headingGps < 0) && ultimaPosicaoValida) {
            const distMov = google.maps.geometry.spherical.computeDistanceBetween(ultimaPosicaoValida, pos);
            if (distMov >= 2) {
                headingGps = calcularHeading(ultimaPosicaoValida, pos);
            }
        }

        let heading = obterHeadingDaRota(pos, headingGps, vel);

        if (heading == null || isNaN(heading)) {
            heading = ultimoHeadingValido || headingAnimado || 0;
        } else {
            if (vel >= 5) {
                heading = suavizarHeadingSeguro(ultimoHeadingValido || heading, heading);
                ultimoHeadingValido = heading;
            } else {
                heading = ultimoHeadingValido || heading || 0;
            }
        }

        moverCameraSuave(pos, heading, vel);

        let prefixo = sentido === "ida" ? "ENTRADA" : "SAIDA";
        let statusTexto = `${prefixo} - EM ROTA`;
        let classeStatus = "cor-verde";

        if (vel > LIMITE_VELOCIDADE) {
            houveExcessoVelocidade = true;
            statusTexto = `${prefixo} - ALERTA VELOCIDADE ${vel}km/h`;
            classeStatus = "cor-vermelha";
        }

        if (ultimaPosicaoValida) {
            const distMov = google.maps.geometry.spherical.computeDistanceBetween(ultimaPosicaoValida, pos);

            if (distMov < 2) {
                if (!inicioParado) inicioParado = agora;
                const tempoParado = (agora - inicioParado) / 1000;

                if (tempoParado >= 60) {
                    houveParadaProlongada = true;
                    statusTexto = `${prefixo} - VEICULO PARADO +60s`;
                    classeStatus = "cor-vermelha";
                }
            } else {
                inicioParado = null;
            }
        }

        if (rotaPath.length) {
            const onRoute = google.maps.geometry.poly.isLocationOnEdge(
                pos,
                new google.maps.Polyline({ path: rotaPath }),
                0.00045
            );

            if (!onRoute) {
                houveForaRota = true;
                statusTexto = `${prefixo} - FORA DA ROTA`;
                classeStatus = "cor-vermelha";
            }
        }

        atualizarStatus(statusTexto, classeStatus);
        await atualizarRegistroViagem(lat, lng, vel, statusTexto);

        const distFinal = google.maps.geometry.spherical.computeDistanceBetween(
            pos,
            new google.maps.LatLng(destCoord.lat, destCoord.lng)
        );

        ultimaPosicaoValida = pos;

        if (distFinal < 20) {
            const statusFinal = sentido === "ida"
                ? `ENTRADA - CHEGOU NO DESTINO ${labelDestino}`
                : `SAIDA - CHEGOU NA PORTARIA`;

            await atualizarRegistroViagem(lat, lng, vel, statusFinal, true);
            atualizarStatus(statusFinal, "cor-verde");

            navigator.geolocation.clearWatch(watchID);
            watchID = null;

            if (sentido === "ida") {
                alert("Chegada no destino " + labelDestino);
            } else {
                alert("Chegada na portaria confirmada.");
                localStorage.clear();
            }
        }

    }, (erro) => {
        console.error("Erro no watchPosition:", erro);
        atualizarStatus("ERRO GPS", "cor-vermelha");
    }, {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 2500
    });
}

window.onload = initMap;

document.addEventListener("contextmenu", event => event.preventDefault());

document.onkeydown = function(e) {
    if (e.keyCode == 123) return false;
    if (e.ctrlKey && e.shiftKey && e.keyCode == "I".charCodeAt(0)) return false;
    if (e.ctrlKey && e.shiftKey && e.keyCode == "J".charCodeAt(0)) return false;
    if (e.ctrlKey && e.keyCode == "U".charCodeAt(0)) return false;
};
