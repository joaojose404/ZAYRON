<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ZAYRONALVORADA - CCO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --visitante: #10b981; --ronda: #3b82f6; --alerta: #ef4444; --bg: #0f172a; --card: #1e293b; }
        body { margin: 0; display: flex; font-family: 'Segoe UI', sans-serif; height: 100vh; background: var(--bg); color: white; overflow: hidden; }
        #sidebar { width: 420px; background: var(--card); display: flex; flex-direction: column; border-right: 1px solid #334155; z-index: 1000; }
        .header { background: #059669; padding: 20px; text-align: center; font-weight: 800; text-transform: uppercase; font-size: 20px; letter-spacing: 1px; }
        #lista-scroll { flex: 1; overflow-y: auto; padding: 15px; background: #111827; }
        .titulo-secao { font-size: 11px; color: #64748b; font-weight: bold; margin: 20px 0 10px 0; border-bottom: 1px solid #1e293b; padding-bottom: 5px; display: block; }
        .card { background: #1e293b; padding: 15px; margin-bottom: 12px; border-radius: 10px; border-left: 6px solid #ccc; cursor: pointer; position: relative; }
        .card.parado-alerta { border-left-color: var(--alerta) !important; animation: blink 1s infinite; }
        @keyframes blink { 0% { box-shadow: 0 0 0px var(--alerta); } 50% { box-shadow: 0 0 15px var(--alerta); } 100% { box-shadow: 0 0 0px var(--alerta); } }
        .status-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; display: inline-block; }
        .badge-chegou { background: #3b82f6; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-left: 5px; }
        .btn-pdf { margin: 10px; padding: 12px; background: #059669; color: white; border: none; cursor: pointer; border-radius: 6px; font-weight: bold; text-transform: uppercase; }
        .btn-encerrar { margin-top: 10px; padding: 6px 12px; background: #334155; color: #cbd5e1; border: none; border-radius: 4px; font-size: 11px; cursor: pointer; width: 100%; }
        #map { flex: 1; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header">ZAYRONALVORADA</div>
    <div style="padding:15px; background:#0f172a;">
        <input type="date" id="data-filtro" style="width:100%; padding:8px; border-radius:4px; background:#1e293b; color:white; border:1px solid #334155;">
    </div>
    <button class="btn-pdf" onclick="gerarRelatoriosSeparados()">📄 GERAR RELATÓRIOS SEPARADOS</button>
    <div id="lista-scroll">
        <span class="titulo-secao">🛡️ RONDAS ATIVAS</span>
        <div id="container-rondas"></div>
        <span class="titulo-secao">🚗 VISITANTES ATIVOS</span>
        <div id="container-visitantes"></div>
    </div>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://ybadcbejraxpkmdjspcv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InliYWRjYmVqcmF4cGttZGpzcGN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5ODEwNzAsImV4cCI6MjA4ODU1NzA3MH0.DpkEcK_ETkYdepGFyrcY7hitWCZGzyCq5J8rZpQTEO0';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const CENTRO_CONDOMINIO = [-23.201919, -47.029214];
const RAIO_MAXIMO = 3000;
const LIMITE_VELOCIDADE = 40;

const map = L.map('map', { zoomControl: false }).setView(CENTRO_CONDOMINIO, 17);

// ADICIONADO: TileLayer para carregar as ruas e números do mapa
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

let markers = {}; 
let nomesEncerrados = new Set(JSON.parse(localStorage.getItem('alvorada_encerrados')) || []);

async function realizarLimpezaOitoDias() {
    const dataLimite = new Date();
    dataLimite.setDate(dataLimite.getDate() - 8);
    const isoString = dataLimite.toISOString();
    await supabaseClient.from('rastreamento').delete().lt('criado_em', isoString);
}

function calcularDistancia(lat1, lon1, lat2, lon2) {
    const R = 6371e3; 
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

async function atualizar() {
    const { data } = await supabaseClient.from('rastreamento').select('*').order('id', { ascending: false }).limit(200);
    if (!data) return;

    const contVis = document.getElementById('container-visitantes');
    const contRon = document.getElementById('container-rondas');
    let htmlVis = ""; let htmlRon = "";
    const ultimoPonto = {};
    const historicoPorNome = {};

    data.reverse().forEach(p => {
        const n = p.nome.toUpperCase();
        if (nomesEncerrados.has(n)) return;
        if (!historicoPorNome[n]) historicoPorNome[n] = [];
        historicoPorNome[n].push(p);
        ultimoPonto[n] = p;
    });

    Object.keys(ultimoPonto).forEach(nome => {
        const u = ultimoPonto[nome];
        const logs = historicoPorNome[nome];
        
        let statusMovimento = "ENTRANDO";
        if (logs.length > 1) {
            const d1 = calcularDistancia(logs[logs.length-2].latitude, logs[logs.length-2].longitude, CENTRO_CONDOMINIO[0], CENTRO_CONDOMINIO[1]);
            const d2 = calcularDistancia(u.latitude, u.longitude, CENTRO_CONDOMINIO[0], CENTRO_CONDOMINIO[1]);
            if (d2 > d1 + 0.5) statusMovimento = "SAINDO";
        }

        let tParado = 0;
        for (let i = logs.length - 1; i > 0; i--) {
            if (logs[i].velocidade < 3) tParado += (new Date(logs[i].criado_em) - new Date(logs[i-1].criado_em)) / 1000;
            else break;
        }

        const dist = calcularDistancia(u.latitude, u.longitude, CENTRO_CONDOMINIO[0], CENTRO_CONDOMINIO[1]);
        const foraRota = dist > RAIO_MAXIMO;
        const velExcedida = u.velocidade > LIMITE_VELOCIDADE;
        const isParado = tParado > 60;
        const isRonda = (u.lote_destino || '').toUpperCase() === 'EM RONDA' || (u.tipo_usuario || '').toLowerCase().includes('ronda');
        
        const cor = (isParado || foraRota || velExcedida) ? '#ef4444' : (isRonda ? '#3b82f6' : '#10b981');

        if (markers[nome]) {
            markers[nome].setLatLng([u.latitude, u.longitude]).setStyle({fillColor: cor});
        } else {
            markers[nome] = L.circleMarker([u.latitude, u.longitude], { radius: 9, color: 'white', fillColor: cor, fillOpacity: 1 }).addTo(map);
        }

        const cardHtml = `
            <div class="card ${isParado || foraRota || velExcedida ? 'parado-alerta' : ''}" style="border-left-color: ${cor}" onclick="map.flyTo([${u.latitude}, ${u.longitude}], 19)">
                <div class="status-badge" style="background: ${statusMovimento === 'ENTRANDO' ? '#3b82f6' : '#f59e0b'}">${statusMovimento}</div>
                ${tParado > 30 ? '<span class="badge-chegou">🏁 NO DESTINO</span>' : ''}
                <br><b>${nome}</b>
                <small>PLACA: ${u.placa} | LOTE: ${u.lote_destino}<br>
                VEL: <span style="color:${velExcedida ? '#ef4444' : 'inherit'}">${u.velocidade} km/h</span> 
                ${isParado ? ' | <span style="color:#ef4444">🛑 PARADO</span>' : ''} 
                ${foraRota ? ' | <span style="color:#f97316">⚠️ FORA ROTA</span>' : ''}</small>
                <button class="btn-encerrar" onclick="event.stopPropagation(); encerrar('${nome}')">Finalizar</button>
            </div>`;

        if (isRonda) htmlRon += cardHtml; else htmlVis += cardHtml;
    });
    contVis.innerHTML = htmlVis; contRon.innerHTML = htmlRon;
}

function encerrar(nome) {
    if(confirm("Encerrar acompanhamento?")) {
        nomesEncerrados.add(nome.toUpperCase());
        localStorage.setItem('alvorada_encerrados', JSON.stringify(Array.from(nomesEncerrados)));
        location.reload();
    }
}

async function gerarRelatoriosSeparados() {
    const dataF = document.getElementById('data-filtro').value;
    const { data } = await supabaseClient.from('rastreamento').select('*').gte('criado_em', `${dataF}T00:00:00`).lte('criado_em', `${dataF}T23:59:59`).order('criado_em', {ascending: true});
    if(!data || data.length === 0) return alert("Nenhum dado encontrado.");
    
    const resumo = {};
    data.forEach(p => {
        const n = p.nome.toUpperCase();
        const isR = (p.lote_destino || '').toUpperCase() === 'EM RONDA' || (p.tipo_usuario || '').toLowerCase().includes('ronda');
        const dist = calcularDistancia(p.latitude, p.longitude, CENTRO_CONDOMINIO[0], CENTRO_CONDOMINIO[1]);
        
        if (!resumo[n]) {
            resumo[n] = { nome: n, placa: p.placa, lote: p.lote_destino, entrada: p.criado_em, vMax: 0, tP: 0, desviou: false, tipo: isR ? 'RONDA' : 'VISITANTE', uS: p.criado_em, infraVel: false };
        }
        
        const diff = (new Date(p.criado_em) - new Date(resumo[n].uS)) / 1000;
        if (p.velocidade < 3) resumo[n].tP += diff;
        if (dist > RAIO_MAXIMO) resumo[n].desviou = true;
        if (p.velocidade > LIMITE_VELOCIDADE) resumo[n].infraVel = true;
        if (p.velocidade > resumo[n].vMax) resumo[n].vMax = p.velocidade;
        resumo[n].uS = p.criado_em;
    });

    const { jsPDF } = window.jspdf;
    
    const processarInfracoes = (r) => {
        let inf = [];
        if (r.infraVel) inf.push(`🚨 EXCESSO VEL. (${r.vMax}km/h)`);
        if (r.desviou) inf.push("🚨 SAIU DA ROTA");
        if (r.tP > 60) inf.push(`🛑 PARADO ${Math.round(r.tP/60)} MIN`);
        return inf.length > 0 ? inf.join(" | ") : "NENHUMA";
    };

    const dadosVis = Object.values(resumo).filter(r => r.tipo === 'VISITANTE');
    if(dadosVis.length > 0) {
        const docV = new jsPDF('l');
        docV.text(`ZAYRONALVORADA - VISITANTES ${dataF}`, 14, 15);
        const rowsVis = dadosVis.map(r => [r.nome, r.placa, r.lote, new Date(r.entrada).toLocaleTimeString(), new Date(r.uS).toLocaleTimeString(), r.vMax + " km/h", r.desviou ? "🚨 FORA ROTA" : "OK", processarInfracoes(r)]);
        docV.autoTable({ head: [['NOME', 'PLACA', 'DESTINO', 'ENTRADA', 'SAÍDA', 'VEL. MÁX', 'STATUS ROTA', 'INFRAÇÕES']], body: rowsVis, startY: 25, headStyles: {fillColor: [16, 185, 129]} });
        docV.save(`Visitantes_${dataF}.pdf`);
    }

    const dadosRon = Object.values(resumo).filter(r => r.tipo === 'RONDA');
    if(dadosRon.length > 0) {
        const docR = new jsPDF('l');
        docR.text(`ZAYRONALVORADA - RONDAS ${dataF}`, 14, 15);
        const rowsRon = dadosRon.map(r => [r.nome, r.placa, new Date(r.entrada).toLocaleTimeString(), new Date(r.uS).toLocaleTimeString(), r.vMax + " km/h", r.desviou ? "🚨 FORA ROTA" : "OK", processarInfracoes(r)]);
        docR.autoTable({ head: [['VIGILANTE', 'VIATURA', 'INÍCIO', 'FIM', 'VEL. MÁX', 'STATUS ROTA', 'INFRAÇÕES']], body: rowsRon, startY: 25, headStyles: {fillColor: [59, 130, 246]} });
        docR.save(`Rondas_${dataF}.pdf`);
    }
}

document.getElementById('data-filtro').valueAsDate = new Date();
realizarLimpezaOitoDias();
setInterval(atualizar, 5000);
atualizar();
</script>
</body>
</html>
