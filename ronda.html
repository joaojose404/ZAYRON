<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RONDA SHIELD - VIGILANTE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #map-ronda { flex: 1; width: 100%; }
        .painel-ronda { background: #1e293b; padding: 20px; border-top: 4px solid #ef4444; text-align: center; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: none; background: #334155; color: white; font-size: 16px; box-sizing: border-box; }
        .btn-ronda { background: #059669; color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-ronda.ativo { background: #ef4444; }
        #cronometro { margin-top: 10px; font-size: 16px; font-weight: bold; color: #fbbf24; min-height: 30px; }
        .ponto-label { background: rgba(0,0,0,0.8); color: white; border: 1px solid #3b82f6; font-size: 9px; font-weight: bold; padding: 2px; text-align: center; border-radius: 3px; }
    </style>
</head>
<body>

<div id="map-ronda"></div>

<div class="painel-ronda">
    <div id="login-area">
        <input type="text" id="nome-vigilante" placeholder="SEU NOME (VIGILANTE)">
        <input type="text" id="num-vigilante" placeholder="PREFIXO / RÁDIO (EX: VTR-01)">
    </div>
    <button id="btn-acao" class="btn-ronda" onclick="gerenciarRonda()">INICIAR TURNO DE RONDA</button>
    <div id="cronometro"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = 'https://ybadcbejraxpkmdjspcv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InliYWRjYmVqcmF4cGttZGpzcGN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5ODEwNzAsImV4cCI6MjA4ODU1NzA3MH0.DpkEcK_ETkYdepGFyrcY7hitWCZGzyCq5J8rZpQTEO0';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);


const map = L.map('map-ronda', { zoomControl: false }).setView([-23.201945, -47.029347], 17);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
const markerVig = L.circleMarker([0,0], {radius: 10, color: '#ef4444', fillColor: '#fff', fillOpacity: 1, weight: 3}).addTo(map);

const pontosObrigatorios = [
    { nome: "Ponto 1: ETE", lat: -23.205488, lng: -47.029630 },
    { nome: "Ponto 2: Q: AM", lat: -23.208707, lng: -47.031041 },
    { nome: "Ponto 3: Travessa do Glauco", lat: -23.207588, lng: -47.034313 },
    { nome: "Ponto 4: Muro: Q:Y", lat: -23.204679, lng: -47.035933 },
    { nome: "Ponto 5: Fundos Q:T", lat: -23.201987, lng: -47.035756 },
    { nome: "Ponto 6: Q: M", lat: -23.201366, lng: -47.034329 },
    { nome: "Ponto 7: Fundos Q: L", lat: -23.200202, lng: -47.035649 },
    { nome: "Ponto 8: Portão 5", lat: -23.197007, lng: -47.034806 },
    { nome: "Ponto 9: Caixa d’agua", lat: -23.193299, lng: -47.033095 },
    { nome: "Ponto 10: Divisa com Japi", lat: -23.196174, lng: -47.031556 },
    { nome: "Portaria", lat: -23.201945, lng: -47.029347 }
];

pontosObrigatorios.forEach(p => {
    L.circle([p.lat, p.lng], { radius: 20, color: '#ef4444', fillOpacity: 0.1, weight: 1 }).addTo(map);
    L.marker([p.lat, p.lng], { icon: L.divIcon({ className: 'ponto-label', html: p.nome.split(':')[0], iconSize: [35, 12] }) }).addTo(map);
});

let watchID, emRonda = false, paradaAtiva = false;
let ultimoPontoVisitado = null;

function gerenciarRonda() {
    const nome = document.getElementById('nome-vigilante').value;
    const num = document.getElementById('num-vigilante').value;
    if(!nome || !num) return alert("Preencha Nome e Prefixo!");

    if(!emRonda) {
        emRonda = true;
        document.getElementById('login-area').style.display = 'none';
        document.getElementById('btn-acao').innerText = "ENCERRAR TURNO";
        document.getElementById('btn-acao').classList.add('ativo');
        iniciarRastreio(nome.toUpperCase(), num.toUpperCase());
    } else {
        if(confirm("Deseja encerrar seu turno de ronda?")) {
            navigator.geolocation.clearWatch(watchID);
            location.reload();
        }
    }
}

async function enviarDadosSupabase(nome, num, lat, lng, vel, ponto) {
    const { error } = await supabaseClient
        .from('rastreamento') // TABELA IGUAL AO PAINEL CCO
        .insert([{
            nome: nome,
            placa: num, 
            lote_destino: ponto || 'EM RONDA',
            latitude: lat,
            longitude: lng,
            velocidade: vel,
            tipo_usuario: 'vigilante', // <--- ISSO FAZ APARECER NA LISTA DE RONDAS
            status: 'EM RONDA'
        }]);
    
    if (error) console.error("Erro ao sincronizar:", error);
}

function iniciarRastreio(nome, num) {
    watchID = navigator.geolocation.watchPosition((p) => {
        const lat = p.coords.latitude;
        const lng = p.coords.longitude;
        const vel = p.coords.speed ? Math.round(p.coords.speed * 3.6) : 0;
        const cPos = L.latLng(lat, lng);
        
        markerVig.setLatLng(cPos);
        map.panTo(cPos, { animate: true });

        // VERIFICAÇÃO DE PONTOS
        if (!paradaAtiva) {
            pontosObrigatorios.forEach(ponto => {
                const dist = cPos.distanceTo(L.latLng(ponto.lat, ponto.lng));
                if (dist < 30 && ultimoPontoVisitado !== ponto.nome) {
                    ultimoPontoVisitado = ponto.nome;
                    iniciarParadaObrigatoria(nome, num, lat, lng, ponto.nome);
                }
            });
        }

        enviarDadosSupabase(nome, num, lat, lng, vel, ultimoPontoVisitado);

    }, (err) => { alert("Ligue o GPS e permita a localização!"); }, 
    { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });
}

function iniciarParadaObrigatoria(nome, num, lat, lng, nomePonto) {
    paradaAtiva = true;
    let tempo = 15;
    const divCron = document.getElementById('cronometro');
    
    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

    const timer = setInterval(() => {
        tempo--;
        divCron.innerHTML = `📍 ${nomePonto}<br>⏱️ OBSERVAÇÃO: ${tempo}s`;
        
        if(tempo <= 0) {
            clearInterval(timer);
            divCron.innerHTML = "✅ PONTO CONCLUÍDO!";
            paradaAtiva = false;
            enviarDadosSupabase(nome, num, lat, lng, 0, "CONCLUÍDO: " + nomePonto);
            if (navigator.vibrate) navigator.vibrate(500);
        }
    }, 1000);
}

window.onbeforeunload = function() { if(emRonda) return "Sair agora encerrará seu turno!"; };
</script>
</body>
</html>
