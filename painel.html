<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ZAYRONALVORADA - CCO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAn7IcmNp_y0vcpZGcTorSYcIV5soYwrrU&libraries=geometry"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --perigo: #ff0000; --bg: #0f172a; --card: #1e293b; }
        body { margin: 0; display: flex; font-family: 'Segoe UI', sans-serif; height: 100vh; background: var(--bg); color: white; overflow: hidden; }
        #sidebar { width: 420px; background: var(--card); display: flex; flex-direction: column; border-right: 1px solid #334155; z-index: 1000; }
        .header { background: #059669; padding: 20px; text-align: center; font-weight: 800; font-size: 20px; }
        #lista-scroll { flex: 1; overflow-y: auto; padding: 15px; background: #111827; }
        .secao-titulo { font-size: 12px; color: #64748b; font-weight: bold; margin: 15px 0 10px 0; text-transform: uppercase; border-bottom: 1px solid #334155; padding-bottom: 5px; }
        .card { background: #1e293b; padding: 14px; margin-bottom: 12px; border-radius: 10px; border-left: 6px solid #ccc; transition: 0.3s; cursor: pointer; }
        .card.infracao { background: #7f1d1d !important; border-left-color: #ff0000 !important; border: 2px solid #ff0000; animation: flash 1s infinite; }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .badge { font-size: 10px; padding: 3px 7px; border-radius: 4px; font-weight: bold; margin-right: 5px; color: white; text-transform: uppercase; }
        .bg-ok { background: #059669; }
        .bg-alerta { background: #ff0000; }
        .vel-box { font-size: 16px; font-weight: 900; padding: 5px 10px; border-radius: 6px; background: #334155; }
        .vel-box.alta { background: #ff0000; }
        .btn-encerrar { margin-top: 10px; padding: 8px; background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; width: 100%; }
        #map { flex: 1; height: 100%; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="header">ZAYRONALVORADA</div>
        <div style="padding:15px; background:#0f172a; display: flex; flex-direction: column; gap: 8px;">
            <input type="date" id="data-filtro" style="width:100%; padding:8px; border-radius:4px; background:#1e293b; color:white; border:1px solid #334155;">
            <button onclick="gerarRelatoriosSeparados()" style="background:#059669; color:white; border:none; padding:10px; border-radius:5px; font-weight:bold; cursor:pointer;">GERAR RELATÓRIOS PDF</button>
            <button onclick="limparCache()" style="background:#eab308; color:black; border:none; padding:8px; border-radius:5px; font-weight:bold; cursor:pointer; font-size:11px;">🔄 RESETAR TODOS ATIVOS</button>
        </div>
        <div id="lista-scroll">
            <div class="secao-titulo">RONDAS</div>
            <div id="container-rondas"></div>
            <div class="secao-titulo">VISITANTES</div>
            <div id="container-visitantes"></div>
        </div>
    </div>
    <div id="map"></div>

<script>
const SUPABASE_URL = 'https://lsotfcirloamzhwgiplf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxzb3RmY2lybG9hbXpod2dpcGxmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNDQ0MjIsImV4cCI6MjA4ODgyMDQyMn0.2PrghPM-3fTVDNg6shxjtaiq7yJAuqSGcxFXrfRozDo';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let map, markers = {}, audioCtx = null;
let nomesEncerrados = new Set(JSON.parse(localStorage.getItem('alvorada_encerrados')) || []);

function dispararSom() {
    try {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if(audioCtx.state === 'suspended') audioCtx.resume();
        let o = audioCtx.createOscillator(); let g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'square'; o.frequency.value = 520;
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
        o.start(); o.stop(audioCtx.currentTime + 0.5);
    } catch(e) {}
}

function ajustarHoraLocal(dataString) {
    let d = new Date(dataString);
    d.setHours(d.getHours() - 3);
    return d;
}

function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: -23.201919, lng: -47.029214 }, zoom: 17, disableDefaultUI: true, zoomControl: true
    });
}

function focarNoPonto(nome, lat, lng) {
    map.setCenter({ lat: parseFloat(lat), lng: parseFloat(lng) });
    map.setZoom(19);
}

async function atualizar() {
    try {
        const { data, error } = await supabaseClient.from('rastreamento').select('*').order('created_at', { ascending: false }).limit(60);
        if (error || !data) return;

        const contVis = document.getElementById('container-visitantes');
        const contRon = document.getElementById('container-rondas');
        const ultimoPonto = {};
        const agora = new Date();

        data.forEach(p => {
            const n = p.nome?.toUpperCase().trim();
            if (!n || nomesEncerrados.has(n)) return;
            if (!ultimoPonto[n]) ultimoPonto[n] = p;
        });

        let hVis = "", hRon = "";
        let nomesAtivos = new Set();
        let bipAtivo = false;

        Object.keys(ultimoPonto).forEach(nome => {
            const u = ultimoPonto[nome];
            const lat = parseFloat(u.latitude), lng = parseFloat(u.longitude);
            const vel = Math.round(u.velocidade || 0);
            
            const horaPontoAjustada = ajustarHoraLocal(u.created_at);
            const diffSegundos = Math.floor((agora.getTime() - horaPontoAjustada.getTime()) / 1000);
            
            const statusV = (u.status_viagem || "").toUpperCase();
            const infracaoRota = statusV.includes("FORA DA ROTA");
            const infracaoVel = vel > 30;
            const infracaoParado = (vel < 5 && diffSegundos >= 180);
            const infracaoGeral = infracaoRota || infracaoVel || infracaoParado;

            if (infracaoGeral) bipAtivo = true;

            const corSetor = (u.lote_destino || "").toUpperCase().includes("RONDA") ? '#3b82f6' : '#10b981';
            const movimento = statusV.includes("INICIO") ? "ENTRANDO" : (statusV.includes("SAIDA") ? "SAINDO" : "EM CURSO");
            nomesAtivos.add(nome);

            if (markers[nome]) {
                markers[nome].setPosition({lat, lng});
            } else {
                markers[nome] = new google.maps.Marker({
                    position: {lat, lng}, map: map, 
                    label: { text: nome, color: corSetor, fontSize: "13px", fontWeight: "900", strokeColor: "black", strokeWeight: 3 },
                    icon: { path: google.maps.SymbolPath.CIRCLE, fillColor: corSetor, fillOpacity: 1, scale: 8, strokeColor: 'white', strokeWeight: 2, labelOrigin: new google.maps.Point(0, -2.5) }
                });
            }

            const card = `
                <div class="card ${infracaoGeral ? 'infracao' : ''}" style="border-left-color:${corSetor}" onclick="focarNoPonto('${nome}', ${lat}, ${lng})">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b>${nome}</b>
                        <div class="vel-box ${infracaoVel ? 'alta' : ''}">${vel} km/h</div>
                    </div>
                    <div style="margin-top:8px;">
                        <span class="badge bg-ok">${movimento}</span>
                        <span class="badge ${infracaoRota ? 'bg-alerta' : 'bg-ok'}">${infracaoRota ? '⚠️ FORA ROTA' : '✓ NA ROTA'}</span>
                    </div>
                    <div style="font-size:12px; margin-top:8px; font-weight:bold;">
                        ${diffSegundos > 60 ? `⏱️ Visto há: ${Math.floor(diffSegundos/60)}m ${diffSegundos%60}s` : `⏱️ Ativo agora`}
                    </div>
                    <div style="font-size:11px; color:#94a3b8; margin-top:5px;">PLACA: ${u.placa} | DESTINO: ${u.lote_destino}</div>
                    <button class="btn-encerrar" onclick="event.stopPropagation(); encerrar('${nome}')">FINALIZAR</button>
                </div>`;
            if (corSetor === '#3b82f6') hRon += card; else hVis += card;
        });

        if (bipAtivo) dispararSom();

        Object.keys(markers).forEach(m => { if(!nomesAtivos.has(m)){ markers[m].setMap(null); delete markers[m]; } });
        contVis.innerHTML = hVis || "<small>Sem visitantes</small>";
        contRon.innerHTML = hRon || "<small>Sem rondas</small>";
    } catch (e) { console.error(e); }
}

function encerrar(nome) {
    nomesEncerrados.add(nome.toUpperCase());
    localStorage.setItem('alvorada_encerrados', JSON.stringify(Array.from(nomesEncerrados)));
    if (markers[nome]) { markers[nome].setMap(null); delete markers[nome]; }
    atualizar();
}

function limparCache() { localStorage.removeItem('alvorada_encerrados'); nomesEncerrados = new Set(); atualizar(); }

async function gerarRelatoriosSeparados() {
    const dataF = document.getElementById('data-filtro').value;
    if (!dataF) return alert("Selecione a data!");
    const { data } = await supabaseClient.from('rastreamento').select('*').gte('created_at', `${dataF}T00:00:00.000Z`).lte('created_at', `${dataF}T23:59:59.999Z`).order('created_at', { ascending: true });
    if (!data || data.length === 0) return alert("Sem dados.");
    
    const resumo = {};
    const agora = new Date();

    data.forEach(p => {
        const id = p.nome + "_" + p.placa;
        const hAjustada = ajustarHoraLocal(p.created_at);
        if (!resumo[id]) resumo[id] = { nome: p.nome, placa: p.placa, lote: p.lote_destino, entrada: hAjustada, vMax: 0, rotaInfra: false, paradoInfra: false, uS: hAjustada, velFinal: 0 };
        
        const r = resumo[id];
        if (p.velocidade > r.vMax) r.vMax = p.velocidade;
        if (p.status_viagem?.toUpperCase().includes("FORA")) r.rotaInfra = true;
        
        r.uS = hAjustada;
        r.velFinal = p.velocidade;
    });

    // Validar se o motorista terminou o dia parado (INFRAÇÃO NO PDF)
    Object.values(resumo).forEach(r => {
        const diffFinal = Math.floor((agora.getTime() - r.uS.getTime()) / 1000);
        if (r.velFinal < 5 && diffFinal >= 180) r.paradoInfra = true;
    });

    const { jsPDF } = window.jspdf;
    const exp = (t, l, c) => {
        if (l.length === 0) return;
        const doc = new jsPDF('l'); 
        doc.text(t + " - " + dataF, 14, 15);
        const rows = l.map(r => {
            let inf = [];
            if (r.vMax > 30) inf.push("VELOCIDADE");
            if (r.rotaInfra) inf.push("ROTA");
            if (r.paradoInfra) inf.push("PARADO");
            return [r.nome, r.placa, r.lote, r.entrada.toLocaleTimeString('pt-BR'), r.uS.toLocaleTimeString('pt-BR'), Math.round(r.vMax)+"km/h", r.rotaInfra ? "SIM" : "NÃO", inf.length > 0 ? inf.join(" / ") : "OK"];
        });
        doc.autoTable({ head: [['NOME', 'PLACA', 'DESTINO', 'INÍCIO', 'FIM', 'V.MÁX', 'FORA ROTA', 'INFRAÇÃO']], body: rows, startY: 20, headStyles: { fillColor: c } });
        doc.save(t + "_" + dataF + ".pdf");
    };
    const list = Object.values(resumo);
    exp("VISITANTES", list.filter(x => !(x.lote||"").includes("RONDA")), [16, 185, 129]);
    exp("RONDAS", list.filter(x => (x.lote||"").includes("RONDA")), [59, 130, 246]);
}

document.getElementById('data-filtro').valueAsDate = new Date();
window.onload = () => { initMap(); atualizar(); setInterval(atualizar, 5000); };
</script>
</body>
</html>
