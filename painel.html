<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ZAYRON CCO ALVORADA</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; display: flex; font-family: sans-serif; height: 100vh; background: #0f172a; color: white; }
        #sidebar { width: 350px; background: #1e293b; display: flex; flex-direction: column; border-right: 2px solid #334155; }
        .header { background: #059669; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; text-transform: uppercase; }
        .stats { display: flex; background: #0f172a; padding: 10px; gap: 10px; }
        .stat-box { text-align: center; flex: 1; background: #1e293b; padding: 10px; border-radius: 8px; border-bottom: 3px solid #059669; }
        .stat-box span { display: block; font-size: 20px; font-weight: bold; }
        #conteudo-sidebar { flex: 1; overflow-y: auto; padding: 10px; }
        .secao-titulo { background: #0f172a; padding: 8px; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-top: 10px; border-radius: 4px; letter-spacing: 1px; }
        
        /* Cards Estilo Imagem */
        .card { background: #334155; padding: 15px; border-radius: 10px; margin-bottom: 12px; border-left: 5px solid #fbbf24; cursor: pointer; position: relative; transition: 0.3s; }
        .card.alerta { border-left-color: #ef4444 !important; background: #451a1a !important; animation: pulse-red 1s infinite; }
        .card.parado-alerta { border-left-color: #f59e0b !important; background: #45301a !important; animation: pulse-orange 1.5s infinite; }

        @keyframes pulse-red { 0% { box-shadow: inset 0 0 0px rgba(239, 68, 68, 0); } 50% { box-shadow: inset 0 0 15px rgba(239, 68, 68, 0.6); } 100% { box-shadow: inset 0 0 0px rgba(239, 68, 68, 0); } }
        @keyframes pulse-orange { 0% { box-shadow: inset 0 0 0px rgba(245, 158, 11, 0); } 50% { box-shadow: inset 0 0 15px rgba(245, 158, 11, 0.6); } 100% { box-shadow: inset 0 0 0px rgba(245, 158, 11, 0); } }

        .status-badge { font-size: 10px; padding: 4px 10px; border-radius: 4px; font-weight: bold; float: right; text-transform: uppercase; background: #059669; }
        .badge-direcao { font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: bold; text-transform: uppercase; display: inline-block; margin-top: 5px; }
        .direcao-entrando { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid #10b981; }
        .direcao-saindo { background: rgba(99, 102, 241, 0.2); color: #a5b4fc; border: 1px solid #6366f1; }

        .btn-imprimir { width: 90%; margin: 10px auto; padding: 12px; background: #059669; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; display: block; font-size: 14px; }
        .btn-relatorio-laranja { width: 100%; margin-top: 10px; padding: 10px; background: #f59e0b; border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        .btn-finalizar-cinza { width: 100%; margin-top: 8px; padding: 10px; background: #475569; border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        .btn-encerrar-ronda { width: 100%; margin-top: 10px; padding: 12px; background: #ef4444; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; }

        #map { flex: 1; height: 100%; }
        #modal-relatorio { display: none; position: fixed; z-index: 9999; left: 360px; top: 20px; background: #1e293b; padding: 20px; border-radius: 10px; border: 2px solid #fbbf24; width: 320px; box-shadow: 0 0 30px rgba(0,0,0,0.7); }
    </style>
</head>
<body>

<audio id="alarmeSonoro" loop><source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg"></audio>

<div id="modal-relatorio">
    <h3 id="rel-nome" style="margin-top:0; color:#fbbf24">Relatório</h3>
    <div id="rel-dados" style="font-size:13px; line-height:1.6"></div>
    <button class="btn-finalizar-cinza" onclick="fecharRelatorio()">FECHAR</button>
</div>

<div id="sidebar">
    <div class="header">ALVORADA SHIELD CCO</div>
    <button class="btn-imprimir" onclick="gerarRelatorioGeral()">📋 RELATÓRIO DO DIA</button>

    <div class="stats">
        <div class="stat-box"> <span id="cont-v">0</span> <small>VISITANTES</small> </div>
        <div class="stat-box"> <span id="cont-r">0</span> <small>RONDAS</small> </div>
    </div>
    
    <div id="conteudo-sidebar">
        <div id="lista-visitantes"></div>
        <div class="secao-titulo">Vigilantes em Campo</div>
        <div id="lista-rondas"></div>
        <div class="secao-titulo">Histórico de Rastro</div>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({ apiKey: "AIzaSyA0rPJ_LsiYW8IcU1imTvWRXPExGNKmC6M", databaseURL: "https://gps-alvorada-default-rtdb.firebaseio.com" });
const db = firebase.database();

const map = L.map('map').setView([-23.201919, -47.029214], 16);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markersV = {}, markersR = {}, polylineRastro = null;

function gerenciarAlarme(ligar) {
    const som = document.getElementById('alarmeSonoro');
    if (ligar) { som.play().catch(() => {}); } else { som.pause(); som.currentTime = 0; }
}

window.verRelatorio = (id, nome) => {
    db.ref('historico_rastro/' + id).once('value', (snap) => {
        const pontosRaw = snap.val();
        if (!pontosRaw) return alert("Sem dados para " + nome);
        let pArray = Object.values(pontosRaw).sort((a, b) => a.timestamp - b.timestamp);
        let coords = [], tParado = 0;
        pArray.forEach((p, i) => {
            if (p.lat && p.lng) coords.push([p.lat, p.lng]);
            if (i > 0) {
                let diff = (p.timestamp - pArray[i-1].timestamp) / 60000;
                if (p.velocidade < 5 && diff > 1) tParado += diff;
            }
        });
        if (polylineRastro) map.removeLayer(polylineRastro);
        polylineRastro = L.polyline(coords, {color: '#fbbf24', weight: 6, opacity: 0.9, dashArray: '10, 15'}).addTo(map);
        map.fitBounds(polylineRastro.getBounds(), {padding: [50, 50]});
        document.getElementById('rel-nome').innerText = nome;
        document.getElementById('rel-dados').innerHTML = `<p><b>Tempo Parado:</b> ~${Math.round(tParado)} min</p><p><b>GPS:</b> ${pArray.length} pontos</p>`;
        document.getElementById('modal-relatorio').style.display = 'block';
    });
};

window.fecharRelatorio = () => { document.getElementById('modal-relatorio').style.display = 'none'; if (polylineRastro) map.removeLayer(polylineRastro); };

// ESCUTA VISITANTES (FORMATO IGUAL IMAGEM)
db.ref('monitoramento').on('value', (snap) => {
    const data = snap.val();
    const lista = document.getElementById('lista-visitantes'); lista.innerHTML = "";
    let alerta = false;
    if (!data) { document.getElementById('cont-v').innerText = "0"; gerenciarAlarme(false); return; }
    document.getElementById('cont-v').innerText = Object.keys(data).length;
    
    Object.keys(data).forEach(id => {
        const info = data[id];
        const vPos = [info.lat || info.pos.lat, info.lng || info.pos.lng];
        const inativo = (Date.now() - (info.timestamp || Date.now())) / 1000;
        const estaParado = (info.velocidade < 2 && inativo > 60);
        const ehSaida = (info.lote_destino === "SAÍDA (PORTARIA)");
        
        if (estaParado || info.velocidade > 30 || info.status === "fora_da_rota") alerta = true;

        if (!markersV[id]) markersV[id] = L.circleMarker(vPos, {radius: 8, color: 'white', fillColor: estaParado ? '#f59e0b' : '#10b981', fillOpacity: 1, weight: 2}).addTo(map);
        else markersV[id].setLatLng(vPos).setStyle({fillColor: estaParado ? '#f59e0b' : '#10b981'});

        const card = document.createElement('div');
        card.className = `card ${estaParado ? 'parado-alerta' : ''} ${info.status === 'fora_da_rota' ? 'alerta' : ''}`;
        
        card.innerHTML = `
            <span class="status-badge">EM ROTA</span>
            <h3 style="margin:0; text-transform:uppercase;">${info.visitante}</h3>
            <div class="badge-direcao ${ehSaida ? 'direcao-saindo' : 'direcao-entrando'}">${ehSaida ? 'SAINDO' : 'ENTRANDO'}</div>
            
            ${estaParado ? `<p style="color:#f59e0b; margin:5px 0; font-weight:bold; font-size:13px;">⚠️ PARADO HÁ +60s</p>` : ''}
            
            <p style="margin:8px 0; font-size:13px;">
                🚗 PLACA: <b>${info.placa}</b> | 🚀 VEL: <b style="color:${info.velocidade > 30 ? 'red' : '#22c55e'}">${info.velocidade} km/h</b>
            </p>
            <p style="margin:0; font-size:14px; font-weight:bold;">📍 ${info.lote_destino}</p>

            <button class="btn-relatorio-laranja" onclick="event.stopPropagation(); verRelatorio('${id}', '${info.visitante}')">📊 VER RASTRO/TEMPO</button>
            <button class="btn-finalizar-cinza" onclick="db.ref('monitoramento/${id}').remove()">FORÇAR FINALIZAR</button>
        `;
        card.onclick = () => map.flyTo(vPos, 18);
        lista.appendChild(card);
    });
    gerenciarAlarme(alerta);
});

// ESCUTA RONDAS
db.ref('rondas_ativas').on('value', (snap) => {
    const data = snap.val();
    const lista = document.getElementById('lista-rondas'); lista.innerHTML = "";
    if (!data) { document.getElementById('cont-r').innerText = "0"; return; }
    document.getElementById('cont-r').innerText = Object.keys(data).length;
    Object.keys(data).forEach(id => {
        const r = data[id];
        const card = document.createElement('div');
        card.className = 'card';
        card.style.borderLeftColor = '#3b82f6';
        card.innerHTML = `
            <h3 style="margin:0; text-transform:uppercase;">🛡️ ${r.vigilante}</h3>
            <p style="margin:10px 0; font-size:13px;">Status: <b>${r.status}</b></p>
            <button class="btn-encerrar-ronda" onclick="db.ref('rondas_ativas/${id}').remove()">ENCERRAR</button>
        `;
        lista.appendChild(card);
    });
});

// RELATÓRIO DO DIA (GERENTE)
async function gerarRelatorioGeral() {
    const senha = prompt("Senha do Gerente:");
    if(senha !== "123") return alert("Acesso negado.");
    const snapHist = await db.ref('historico_rastro').once('value');
    const snapRonda = await db.ref('relatorios_ronda').once('value');
    let html = `<html><head><title>Relatório</title><style>body{font-family:sans-serif;padding:20px;} table{width:100%;border-collapse:collapse;margin-bottom:20px;} th,td{border:1px solid #ddd;padding:8px;text-align:left;} th{background:#059669;color:white;}</style></head><body>`;
    html += `<h2>VISITANTES</h2><table><tr><th>Visitante</th><th>Início</th><th>Fim</th><th>Vel. Máx</th><th>Parado</th></tr>`;
    if(snapHist.val()) Object.keys(snapHist.val()).forEach(id => {
        const p = Object.values(snapHist.val()[id]).sort((a,b)=>a.timestamp-b.timestamp);
        let vMx=0, tP=0; p.forEach((x,i)=>{if(x.velocidade>vMx)vMx=x.velocidade; if(i>0){let d=(x.timestamp-p[i-1].timestamp)/60000; if(x.velocidade<5&&d>1)tP+=d;}});
        html += `<tr><td>${id}</td><td>${new Date(p[0].timestamp).toLocaleTimeString()}</td><td>${new Date(p[p.length-1].timestamp).toLocaleTimeString()}</td><td>${vMx}km/h</td><td>${Math.round(tP)}min</td></tr>`;
    });
    html += `</table><h2>RONDAS</h2><table><tr><th>Vigilante</th><th>Ponto</th><th>Hora</th><th>Permanência</th></tr>`;
    if(snapRonda.val()) Object.keys(snapRonda.val()).forEach(v => Object.keys(snapRonda.val()[v]).forEach(s => {
        const p = snapRonda.val()[v][s].paradas; if(p) Object.values(p).forEach(x => { html += `<tr><td>${v}</td><td>${x.ponto}</td><td>${x.hora}</td><td>${x.permanencia}</td></tr>`; });
    }));
    html += `</table></body></html>`;
    const win = window.open('',''); win.document.write(html); win.print();
}
</script>
</body>
</html>
