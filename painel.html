<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ZAYRON CCO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #0f172a; color: white; font-family: sans-serif; }
        #sidebar { width: 320px; background: #1e293b; padding: 15px; border-right: 2px solid #334155; overflow-y: auto; }
        #map { flex: 1; background: #000; }
        .card { background: #334155; padding: 12px; margin-bottom: 8px; border-radius: 8px; border-left: 5px solid #059669; }
        .header { font-size: 18px; font-weight: bold; color: #059669; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="header">ZAYRON MONITORAMENTO</div>
        <div id="status" style="text-align: center; color: #94a3b8; margin-bottom: 10px;">Conectando...</div>
        <div id="lista-visitantes"></div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([-23.2019, -47.0292], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let markers = {};
        
        // Usando a Key direto na URL para evitar erros de cabeçalho
        const NEON_URL = "https://ep-super-violet-acvz7izl.sa-east-1.aws.neon.tech/v1/execute?apikey=npg_FRN3O7oVTmPs";

        async function atualizar() {
            try {
                const res = await fetch(NEON_URL, {
                    method: 'POST',
                    // Importante: Neon exige que o corpo seja exatamente assim
                    body: JSON.stringify({ 
                        sql: "SELECT * FROM monitoramento_zayron;" 
                    })
                });

                const data = await res.json();
                
                if (data.error) {
                    console.error("Erro no SQL:", data.error);
                    return;
                }

                const rows = data.rows || [];
                document.getElementById('status').innerText = `Veículos ativos: ${rows.length}`;
                
                const lista = document.getElementById('lista-visitantes');
                lista.innerHTML = "";

                rows.forEach(p => {
                    const pos = [p.lat, p.lng];
                    if (!markers[p.placa]) {
                        markers[p.placa] = L.marker(pos).addTo(map).bindPopup(p.nome);
                    } else {
                        markers[p.placa].setLatLng(pos);
                    }
                    lista.innerHTML += `<div class="card"><b>${p.nome}</b><br>${p.placa} - ${p.velocidade}km/h</div>`;
                });
            } catch (e) {
                document.getElementById('status').innerText = "Sincronizando...";
                console.error("Erro:", e);
            }
        }

        setInterval(atualizar, 3000);
        atualizar();
    </script>
</body>
</html>
